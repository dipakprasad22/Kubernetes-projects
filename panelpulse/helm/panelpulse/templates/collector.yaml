apiVersion: apps/v1
kind: Deployment
metadata:
  name: collector
  namespace: {{ .Values.global.namespace }}
  labels: { app: collector, tier: ingest }
spec:
  replicas: {{ .Values.collector.replicas }}
  selector: { matchLabels: { app: collector } }
  strategy: { type: RollingUpdate, rollingUpdate: { maxUnavailable: 0, maxSurge: 2 } }
  template:
    metadata: { labels: { app: collector, tier: ingest } }
    spec:
      securityContext: { runAsNonRoot: true, runAsUser: 65532, seccompProfile: { type: RuntimeDefault } }
      containers:
        - name: collector
          image: "{{ .Values.global.imageRegistry }}/collector:{{ .Values.global.imageTag }}"
          ports: [{ containerPort: 8080 }]
          envFrom: [{ configMapRef: { name: panelpulse-config } }]
          readinessProbe: { httpGet: { path: /ready, port: 8080 }, periodSeconds: 5 }
          livenessProbe: { httpGet: { path: /health, port: 8080 }, periodSeconds: 10 }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
          resources:
            requests: { cpu: "100m", memory: "64Mi" }
            limits: { cpu: "500m", memory: "128Mi" }
---
apiVersion: v1
kind: Service
metadata: { name: collector, namespace: {{ .Values.global.namespace }} }
spec:
  selector: { app: collector }
  ports: [{ port: 80, targetPort: 8080 }]
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata: { name: collector, namespace: {{ .Values.global.namespace }} }
spec:
  scaleTargetRef: { apiVersion: apps/v1, kind: Deployment, name: collector }
  minReplicas: {{ .Values.collector.minReplicas }}
  maxReplicas: {{ .Values.collector.maxReplicas }}
  metrics:
    - type: Resource
      resource: { name: cpu, target: { type: Utilization, averageUtilization: 60 } }

spring.application.name=processor
server.port=8080
# Kafka consumer
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP:kafka:9092}
spring.kafka.consumer.group-id=panelpulse-processors
spring.kafka.consumer.auto-offset-reset=earliest
# Results store
spring.datasource.url=jdbc:postgresql://${DB_HOST:results-db}:${DB_PORT:5432}/${DB_NAME:panelpulse}
spring.datasource.username=${DB_USER:panelpulse}
spring.datasource.password=${DB_PASSWORD:}
spring.jpa.hibernate.ddl-auto=update
management.endpoints.web.exposure.include=health,prometheus
management.endpoint.health.probes.enabled=true

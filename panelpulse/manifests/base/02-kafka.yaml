# Kafka as a StatefulSet — the durable event buffer that absorbs ingest spikes
# and decouples collectors from processors. Single-broker KRaft mode for local;
# on EKS use Amazon MSK (managed Kafka) instead (see manifests/eks).
apiVersion: v1
kind: Service
metadata: { name: kafka, namespace: panelpulse }
spec:
  clusterIP: None              # headless for the StatefulSet
  selector: { app: kafka }
  ports: [{ port: 9092, targetPort: 9092, name: broker }]
---
apiVersion: apps/v1
kind: StatefulSet
metadata: { name: kafka, namespace: panelpulse }
spec:
  serviceName: kafka
  replicas: 1
  selector: { matchLabels: { app: kafka } }
  template:
    metadata: { labels: { app: kafka } }
    spec:
      containers:
        - name: kafka
          image: bitnami/kafka:3.7
          ports: [{ containerPort: 9092 }]
          env:
            - { name: KAFKA_CFG_NODE_ID, value: "0" }
            - { name: KAFKA_CFG_PROCESS_ROLES, value: "controller,broker" }
            - { name: KAFKA_CFG_CONTROLLER_QUORUM_VOTERS, value: "0@kafka-0.kafka:9093" }
            - { name: KAFKA_CFG_LISTENERS, value: "PLAINTEXT://:9092,CONTROLLER://:9093" }
            - { name: KAFKA_CFG_ADVERTISED_LISTENERS, value: "PLAINTEXT://kafka-0.kafka:9092" }
            - { name: KAFKA_CFG_CONTROLLER_LISTENER_NAMES, value: "CONTROLLER" }
            - { name: KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP, value: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT" }
            - { name: KAFKA_CFG_OFFSETS_TOPIC_REPLICATION_FACTOR, value: "1" }
          volumeMounts: [{ name: data, mountPath: /bitnami/kafka }]
          readinessProbe:
            tcpSocket: { port: 9092 }
            initialDelaySeconds: 15
            periodSeconds: 10
          resources:
            requests: { cpu: "250m", memory: "512Mi" }
            limits: { cpu: "1", memory: "1Gi" }
  volumeClaimTemplates:
    - metadata: { name: data }
      spec:
        accessModes: [ReadWriteOnce]
        resources: { requests: { storage: 2Gi } }

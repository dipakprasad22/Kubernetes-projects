# Scheduled batch that rolls up processed_events into measurement_aggregates
# (impressions = count, viewing minutes = sum(duration)/60, reach = distinct panelists,
# grouped by channel + daypart). Run-to-completion Job via CronJob.
apiVersion: batch/v1
kind: CronJob
metadata:
  name: aggregator
  namespace: panelpulse
spec:
  schedule: "15 * * * *"        # hourly at :15 (after the hour's events settle)
  concurrencyPolicy: Forbid      # never overlap aggregation runs
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 2
      activeDeadlineSeconds: 600
      template:
        spec:
          restartPolicy: Never
          securityContext: { runAsNonRoot: true, runAsUser: 1001, seccompProfile: { type: RuntimeDefault } }
          containers:
            - name: aggregator
              image: panelpulse/aggregator:1.0
              envFrom: [{ configMapRef: { name: panelpulse-config } }]
              env:
                - name: DB_PASSWORD
                  valueFrom: { secretKeyRef: { name: panelpulse-secrets, key: DB_PASSWORD } }
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                capabilities: { drop: ["ALL"] }
              volumeMounts: [{ name: tmp, mountPath: /tmp }]
              resources:
                requests: { cpu: "200m", memory: "512Mi" }
                limits: { cpu: "1", memory: "1Gi" }
          volumes: [{ name: tmp, emptyDir: {} }]

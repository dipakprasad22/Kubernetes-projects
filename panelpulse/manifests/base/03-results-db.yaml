apiVersion: v1
kind: Service
metadata: { name: results-db, namespace: panelpulse }
spec:
  clusterIP: None
  selector: { app: results-db }
  ports: [{ port: 5432, targetPort: 5432 }]
---
apiVersion: apps/v1
kind: StatefulSet
metadata: { name: results-db, namespace: panelpulse }
spec:
  serviceName: results-db
  replicas: 1
  selector: { matchLabels: { app: results-db } }
  template:
    metadata: { labels: { app: results-db } }
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports: [{ containerPort: 5432 }]
          env:
            - { name: POSTGRES_USER, value: "panelpulse" }
            - name: POSTGRES_PASSWORD
              valueFrom: { secretKeyRef: { name: panelpulse-secrets, key: DB_PASSWORD } }
            - { name: POSTGRES_DB, value: "panelpulse" }
          volumeMounts: [{ name: data, mountPath: /var/lib/postgresql/data }]
          readinessProbe:
            exec: { command: ["pg_isready", "-U", "panelpulse"] }
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests: { cpu: "100m", memory: "256Mi" }
            limits: { cpu: "500m", memory: "512Mi" }
  volumeClaimTemplates:
    - metadata: { name: data }
      spec:
        accessModes: [ReadWriteOnce]
        resources: { requests: { storage: 2Gi } }

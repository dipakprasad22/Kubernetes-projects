# node-agent runs ONE pod per node (DaemonSet) — node-level health/metrics for the
# measurement fleet. The classic DaemonSet use case (like a log/metrics agent).
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: node-agent
  namespace: panelpulse
  labels: { app: node-agent }
spec:
  selector: { matchLabels: { app: node-agent } }
  template:
    metadata: { labels: { app: node-agent } }
    spec:
      securityContext: { runAsNonRoot: true, runAsUser: 65532, seccompProfile: { type: RuntimeDefault } }
      containers:
        - name: node-agent
          image: panelpulse/node-agent:1.0
          ports: [{ containerPort: 9100, name: metrics }]
          env:
            - name: NODE_NAME
              valueFrom: { fieldRef: { fieldPath: spec.nodeName } }  # which node am I on
          readinessProbe: { httpGet: { path: /health, port: 9100 }, periodSeconds: 10 }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
          resources:
            requests: { cpu: "25m", memory: "32Mi" }
            limits: { cpu: "100m", memory: "64Mi" }
      tolerations:
        - operator: Exists       # run on every node, even tainted ones

apiVersion: apps/v1
kind: Deployment
metadata:
  name: users
  namespace: shopkart
  labels: { app: users, app.kubernetes.io/part-of: shopkart }
spec:
  replicas: 2
  selector: { matchLabels: { app: users } }
  strategy:
    type: RollingUpdate
    rollingUpdate: { maxUnavailable: 0, maxSurge: 1 }   # zero-downtime
  template:
    metadata: { labels: { app: users } }
    spec:
      containers:
        - name: users
          image: shopkart/users:1.0
          ports: [{ containerPort: 8080 }]
          envFrom:
            - configMapRef: { name: shopkart-config }
          env:
            - { name: PORT, value: "8080" }
            - name: DB_PASSWORD
              valueFrom: { secretKeyRef: { name: shopkart-secrets, key: DB_PASSWORD } }
            - { name: DB_NAME, value: "users" }
          readinessProbe:
            httpGet: { path: /ready, port: 8080 }
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet: { path: /health, port: 8080 }
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
          resources:
            requests: { cpu: "50m", memory: "64Mi" }
            limits: { cpu: "300m", memory: "256Mi" }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532          # distroless nonroot uid
---
apiVersion: v1
kind: Service
metadata:
  name: users
  namespace: shopkart
spec:
  selector: { app: users }
  ports: [{ port: 80, targetPort: 8080, name: http }]
  type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: users
  namespace: shopkart
spec:
  scaleTargetRef: { apiVersion: apps/v1, kind: Deployment, name: users }
  minReplicas: 2
  maxReplicas: 8
  metrics:
    - type: Resource
      resource: { name: cpu, target: { type: Utilization, averageUtilization: 60 } }

apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  namespace: shopkart
  labels: { app: gateway, app.kubernetes.io/part-of: shopkart }
spec:
  replicas: 2
  selector: { matchLabels: { app: gateway } }
  strategy:
    type: RollingUpdate
    rollingUpdate: { maxUnavailable: 0, maxSurge: 1 }
  template:
    metadata: { labels: { app: gateway } }
    spec:
      containers:
        - name: gateway
          image: shopkart/gateway:1.0
          ports: [{ containerPort: 8080 }]
          envFrom: [{ configMapRef: { name: shopkart-config } }]
          env: [{ name: PORT, value: "8080" }]
          readinessProbe: { httpGet: { path: /ready, port: 8080 }, initialDelaySeconds: 3, periodSeconds: 5 }
          livenessProbe: { httpGet: { path: /health, port: 8080 }, initialDelaySeconds: 10, periodSeconds: 10 }
          resources:
            requests: { cpu: "50m", memory: "64Mi" }
            limits: { cpu: "300m", memory: "256Mi" }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
      securityContext: { runAsNonRoot: true, runAsUser: 65532 }
---
apiVersion: v1
kind: Service
metadata: { name: gateway, namespace: shopkart }
spec:
  selector: { app: gateway }
  ports: [{ port: 8080, targetPort: 8080 }]
  type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata: { name: gateway, namespace: shopkart }
spec:
  scaleTargetRef: { apiVersion: apps/v1, kind: Deployment, name: gateway }
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource: { name: cpu, target: { type: Utilization, averageUtilization: 60 } }

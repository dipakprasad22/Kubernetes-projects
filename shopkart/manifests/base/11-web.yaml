apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
  namespace: shopkart
  labels: { app: web, app.kubernetes.io/part-of: shopkart }
spec:
  replicas: 2
  selector: { matchLabels: { app: web } }
  strategy: { type: RollingUpdate, rollingUpdate: { maxUnavailable: 0, maxSurge: 1 } }
  template:
    metadata: { labels: { app: web } }
    spec:
      containers:
        - name: web
          image: shopkart/web:1.0
          ports: [{ containerPort: 3000 }]
          envFrom: [{ configMapRef: { name: shopkart-config } }]
          env: [{ name: PORT, value: "3000" }]
          readinessProbe: { httpGet: { path: /ready, port: 3000 }, initialDelaySeconds: 3, periodSeconds: 5 }
          livenessProbe: { httpGet: { path: /health, port: 3000 }, initialDelaySeconds: 10, periodSeconds: 10 }
          resources:
            requests: { cpu: "50m", memory: "64Mi" }
            limits: { cpu: "200m", memory: "128Mi" }
          securityContext: { allowPrivilegeEscalation: false, capabilities: { drop: ["ALL"] } }
      securityContext: { runAsNonRoot: true, runAsUser: 1000, runAsGroup: 1000 }
---
apiVersion: v1
kind: Service
metadata: { name: web, namespace: shopkart }
spec:
  selector: { app: web }
  ports: [{ port: 80, targetPort: 3000 }]
  type: ClusterIP

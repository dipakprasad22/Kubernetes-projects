# On EKS, services that call AWS (e.g. read DB creds from Secrets Manager)
# use a ServiceAccount mapped to a least-privilege IAM role via IRSA.
# Create the role + association with eksctl:
#   eksctl create iamserviceaccount --name shopkart-sa --namespace shopkart \
#     --cluster <cluster> --attach-policy-arn <scoped-policy-arn> --approve
# Then set serviceAccountName: shopkart-sa on the relevant Deployments.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: shopkart-sa
  namespace: shopkart
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::<ACCOUNT_ID>:role/shopkart-secrets-reader

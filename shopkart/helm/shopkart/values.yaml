# ShopKart Helm values — override per environment (values-kind.yaml / values-eks.yaml).
global:
  namespace: shopkart
  imageRegistry: "AWS_ID.dkr.ecr.us-east-1.amazonaws.com"        # local; set to <acct>.dkr.ecr.<region>.amazonaws.com on EKS
  imageTag: "1.0"

config:
  DB_HOST: "DB_HOST_NAME.us-east-1.rds.amazonaws.com"
  DB_PORT: "5432"
  DB_USER: "postgres"
  DB_SSLMODE: "require"
  REDIS_HOST: "REDIS_HOST_NAME.serverless.use1.cache.amazonaws.com"
  REDIS_PORT: "6379"

secrets:
  DB_PASSWORD: "DB_PASSWORD"   # override; on EKS source from Secrets Manager

# Each microservice: replicas, port, autoscaling bounds, db name
services:
  gateway: { port: 8080, replicas: 2, minReplicas: 2, maxReplicas: 10 }
  catalog: { port: 8080, replicas: 2, minReplicas: 2, maxReplicas: 8, dbName: catalog }
  cart:    { port: 8080, replicas: 2, minReplicas: 2, maxReplicas: 8 }
  orders:  { port: 8080, replicas: 2, minReplicas: 2, maxReplicas: 8, dbName: orders }
  users:   { port: 8080, replicas: 2, minReplicas: 2, maxReplicas: 8, dbName: users }
  web:     { port: 3000, replicas: 2, minReplicas: 2, maxReplicas: 8 }


ingress:
  enabled: true
  className: nginx          # "alb" on EKS
  alb: false                # true on EKS to add ALB annotations

datatier:
  inCluster: false           # true on KIND (Postgres/Redis StatefulSets); false on EKS (RDS/ElastiCache)

resources:
  requests: { cpu: "50m", memory: "64Mi" }
  limits:   { cpu: "300m", memory: "256Mi" }

hpaTargetCPU: 60
<svg xmlns="http://www.w3.org/2000/svg" width="680" height="520" viewBox="0 0 680 520" font-family="system-ui,Arial" font-size="12">
<style>.b{fill:#fff;stroke-width:1.2}.t{text-anchor:middle}.h{font-weight:600}</style>
<rect width="680" height="520" fill="#fafafa"/>
<text x="340" y="26" class="t h" font-size="15">ShopKart — E-Commerce Microservices on Kubernetes</text>
<rect class="b" x="270" y="44" width="140" height="30" rx="6" stroke="#2a9d5c"/><text x="340" y="63" class="t">Users (HTTPS)</text>
<rect class="b" x="230" y="88" width="220" height="38" rx="8" stroke="#e0a020"/><text x="340" y="104" class="t h">Ingress (ALB on EKS)</text><text x="340" y="119" class="t" font-size="10">/ → web · /api → gateway</text>
<line x1="340" y1="74" x2="340" y2="86" stroke="#888"/>
<rect class="b" x="60" y="150" width="180" height="44" rx="7" stroke="#3b7dd8"/><text x="150" y="168" class="t h">Web / BFF</text><text x="150" y="184" class="t" font-size="10">Node.js · HPA</text>
<rect class="b" x="440" y="150" width="180" height="44" rx="7" stroke="#7a5bd0"/><text x="530" y="168" class="t h">API Gateway</text><text x="530" y="184" class="t" font-size="10">Go · HPA</text>
<line x1="300" y1="126" x2="160" y2="148" stroke="#888"/><line x1="380" y1="126" x2="520" y2="148" stroke="#888"/>
<line x1="240" y1="172" x2="438" y2="172" stroke="#888"/>
<g>
<rect class="b" x="40" y="226" width="135" height="58" rx="7" stroke="#1aa1a1"/><text x="107" y="248" class="t h">Catalog</text><text x="107" y="266" class="t" font-size="10">Go → Postgres</text>
<rect class="b" x="190" y="226" width="135" height="58" rx="7" stroke="#1aa1a1"/><text x="257" y="248" class="t h">Cart</text><text x="257" y="266" class="t" font-size="10">Go → Redis</text>
<rect class="b" x="355" y="226" width="135" height="58" rx="7" stroke="#1aa1a1"/><text x="422" y="248" class="t h">Orders</text><text x="422" y="266" class="t" font-size="10">Go → PG + MQ</text>
<rect class="b" x="505" y="226" width="135" height="58" rx="7" stroke="#1aa1a1"/><text x="572" y="248" class="t h">Users</text><text x="572" y="266" class="t" font-size="10">Go → Postgres</text>
</g>
<line x1="510" y1="194" x2="130" y2="224" stroke="#bbb"/><line x1="520" y1="194" x2="257" y2="224" stroke="#bbb"/><line x1="530" y1="194" x2="422" y2="224" stroke="#bbb"/><line x1="545" y1="194" x2="572" y2="224" stroke="#bbb"/>
<g>
<rect class="b" x="60" y="320" width="160" height="50" rx="7" stroke="#3b7dd8"/><text x="140" y="340" class="t h">Postgres</text><text x="140" y="358" class="t" font-size="10">StatefulSet/RDS</text>
<rect class="b" x="260" y="320" width="160" height="50" rx="7" stroke="#d86b5b"/><text x="340" y="340" class="t h">Redis</text><text x="340" y="358" class="t" font-size="10">cart sessions</text>
<rect class="b" x="460" y="320" width="160" height="50" rx="7" stroke="#e0a020"/><text x="540" y="340" class="t h">RabbitMQ</text><text x="540" y="358" class="t" font-size="10">order events</text>
</g>
<line x1="107" y1="284" x2="135" y2="318" stroke="#bbb"/><line x1="257" y1="284" x2="335" y2="318" stroke="#bbb"/><line x1="422" y1="284" x2="430" y2="318" stroke="#bbb"/><line x1="450" y1="276" x2="510" y2="318" stroke="#bbb"/>
<rect class="b" x="40" y="398" width="600" height="100" rx="8" stroke="#aaa"/>
<text x="56" y="420" class="h">Cross-cutting</text>
<text x="56" y="442" font-size="11">ConfigMaps + Secrets (IRSA/Secrets Manager on EKS) · HPA per service (flash-sale load)</text>
<text x="56" y="462" font-size="11">NetworkPolicy default-deny + allowlist (data tier isolated) · securityContext (non-root, drop caps)</text>
<text x="56" y="482" font-size="11">Zero-downtime rolling deploys (maxUnavailable:0 + readiness probes) · one Ingress, path routing</text>
</svg>

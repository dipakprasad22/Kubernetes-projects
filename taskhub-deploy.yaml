apiVersion: apps/v1
kind: Deployment
metadata:
  name: taskhub
  labels: { app: taskhub } 
spec:
  replicas: 3
  selector:
    matchLabels: { app: taskhub }     # MUST match template labels (immutable!)
  template:
    metadata:
      labels: { app: taskhub }
    spec:
      containers:
        - name: taskhub
          image: nginx:1.27            # stand-in; swap for your taskhub image
          ports: [{ containerPort: 80 }]
          resources:
            limits:
              cpu: 500m
              memory: 256Mi
            requests:
              cpu: 250m
              memory: 128Mi
          env:
            - name: ENVIRONMENT
              value: "production"
            - name: LOG_LEVEL
              value: "info"
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 5
      #     volumeMounts:
      #       - name: config-volume
      #         mountPath: /etc/taskhub/config
      # volumes:
      #   - name: config-volume
      #     configMap:
      #       name: taskhub-config
      #       items:
      #         - key: config.yaml
      #           path: config.yaml
---

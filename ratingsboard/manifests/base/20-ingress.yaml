apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ratingsboard
  namespace: ratingsboard

spec:
  ingressClassName: nginx
  rules:
    - http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: reporting-api
                port:
                  number: 8000

          - path: /
            pathType: Prefix
            backend:
              service:
                name: dashboard
                port:
                  number: 80
apiVersion: v1
kind: Namespace
metadata:
  name: finledger
  labels:
    app.kubernetes.io/part-of: finledger
    # Enforce the hardened Pod Security Standard cluster-side: the API server
    # REJECTS any pod that runs as root, privileged, or with escalation.
    pod-security.kubernetes.io/enforce: restricted
    pod-security.kubernetes.io/enforce-version: latest
    pod-security.kubernetes.io/warn: restricted
    pod-security.kubernetes.io/audit: restricted

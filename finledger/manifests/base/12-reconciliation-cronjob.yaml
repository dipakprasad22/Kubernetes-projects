apiVersion: batch/v1
kind: CronJob
metadata:
  name: reconciliation
  namespace: finledger
spec:
  schedule: "0 * * * *"           # hourly (use "*/5 * * * *" to demo)
  concurrencyPolicy: Forbid        # never overlap reconciliation runs
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 2
      activeDeadlineSeconds: 300
      template:
        spec:
          restartPolicy: Never
          securityContext:
            runAsNonRoot: true
            runAsUser: 1001
            seccompProfile: { type: RuntimeDefault }
          containers:
            - name: reconciliation
              image: finledger/reconciliation:1.0
              envFrom: [{ configMapRef: { name: finledger-config } }]
              env:
                - name: DB_PASSWORD
                  valueFrom: { secretKeyRef: { name: finledger-secrets, key: DB_PASSWORD } }
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                capabilities: { drop: ["ALL"] }
              volumeMounts: [{ name: tmp, mountPath: /tmp }]
              resources:
                requests: { cpu: "100m", memory: "256Mi" }
                limits: { cpu: "500m", memory: "512Mi" }
          volumes: [{ name: tmp, emptyDir: {} }]

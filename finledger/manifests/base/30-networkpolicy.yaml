# 1) Default-deny ALL ingress and egress in the namespace (zero-trust baseline).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata: { name: default-deny-all, namespace: finledger }
spec:
  podSelector: {}
  policyTypes: [Ingress, Egress]
---
# 2) Allow DNS egress (CoreDNS) — without this, name resolution breaks for all pods.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata: { name: allow-dns-egress, namespace: finledger }
spec:
  podSelector: {}
  policyTypes: [Egress]
  egress:
    - to:
        - namespaceSelector: {}
          podSelector: { matchLabels: { k8s-app: kube-dns } }
      ports:
        - { protocol: UDP, port: 53 }
        - { protocol: TCP, port: 53 }
---
# 3) Ingress controller / API clients may reach the transaction-api on 8080.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata: { name: allow-api-ingress, namespace: finledger }
spec:
  podSelector: { matchLabels: { app: transaction-api } }
  policyTypes: [Ingress]
  ingress:
    - from:
        - namespaceSelector: { matchLabels: { kubernetes.io/metadata.name: ingress-nginx } }
      ports: [{ protocol: TCP, port: 8080 }]
---
# 4) transaction-api + reconciliation + fraud-worker may egress to Postgres:5432.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata: { name: allow-db-egress, namespace: finledger }
spec:
  podSelector:
    matchExpressions:
      - { key: app, operator: In, values: [transaction-api, reconciliation, fraud-worker] }
  policyTypes: [Egress]
  egress:
    - to: [{ podSelector: { matchLabels: { app: postgres } } }]
      ports: [{ protocol: TCP, port: 5432 }]
---
# 5) Postgres accepts ingress ONLY from those three app labels on 5432.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata: { name: postgres-ingress, namespace: finledger }
spec:
  podSelector: { matchLabels: { app: postgres } }
  policyTypes: [Ingress]
  ingress:
    - from:
        - podSelector: { matchLabels: { app: transaction-api } }
        - podSelector: { matchLabels: { app: reconciliation } }
        - podSelector: { matchLabels: { app: fraud-worker } }
      ports: [{ protocol: TCP, port: 5432 }]

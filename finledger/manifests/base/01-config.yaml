apiVersion: v1
kind: ConfigMap
metadata: { name: finledger-config, namespace: finledger }
data:
  DB_HOST: "postgres"
  DB_PORT: "5432"
  DB_NAME: "finledger"
  DB_USER: "finledger"
---
# Secrets are base64, NOT encrypted by default. In finance this is non-negotiable:
# on EKS enable etcd encryption-at-rest (KMS) AND restrict reads via RBAC,
# or source from Secrets Manager via IRSA (preferred). Dev placeholder below.
apiVersion: v1
kind: Secret
metadata: { name: finledger-secrets, namespace: finledger }
type: Opaque
stringData:
  DB_PASSWORD: "finledger_dev_password"

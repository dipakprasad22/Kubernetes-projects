# On EKS, the transaction-api reads the DB password from Secrets Manager via IRSA
# (least-privilege IAM role scoped to ONE secret) — never a stored key.
# Create with eksctl:
#   eksctl create iamserviceaccount --name transaction-api-sa --namespace finledger \
#     --cluster <cluster> --attach-policy-arn <scoped-secrets-read-policy> --approve
apiVersion: v1
kind: ServiceAccount
metadata:
  name: transaction-api-sa
  namespace: finledger
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::<ACCOUNT_ID>:role/finledger-secrets-reader

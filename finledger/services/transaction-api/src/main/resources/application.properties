spring.application.name=transaction-api
server.port=8080

# Datasource from env (ConfigMap + Secret). On EKS, password from Secrets Manager via IRSA.
spring.datasource.url=jdbc:postgresql://${DB_HOST:postgres}:${DB_PORT:5432}/${DB_NAME:finledger}
spring.datasource.username=${DB_USER:finledger}
spring.datasource.password=${DB_PASSWORD:}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Actuator health for K8s probes; expose only health (don't leak internals).
management.endpoints.web.exposure.include=health
management.endpoint.health.probes.enabled=true
